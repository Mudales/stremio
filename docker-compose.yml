version: '3.8'
services:
  stremio:
    build: .
    container_name: stremio
    ports:
      - "11470:11470"
      - "443:12470"
    volumes:
      - ./stremio-server:/root/.stremio-server
    command: -d
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
